<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易窝蜂AI生产基地</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: auto;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: "微软雅黑", sans-serif;
        }
        /* 长图容器：自适应高度，支持超长海报 */
        .long-image-container {
            width: 100%;
            position: relative;
        }
        .long-bg {
            width: 100%;
            height: auto;
            display: block;
        }
        /* 固定悬浮报名按钮 */
        .join-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 44px;
            background: #ff6600;
            color: #fff;
            font-size: 19px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 18px rgba(255,102,0,0.45);
            z-index: 998;
            white-space: nowrap;
        }
        /* 弹窗遮罩 */
        .mask {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 999;
        }
        /* 问卷弹窗 */
        .popup {
            width: 92%;
            height: 82%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        .close {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 26px;
            color: #222;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body>

<!-- 长图区域：替换src为你的长图链接即可 -->
<div class="long-image-container">
    <img class="long-bg" src="haibao-long.jpg" alt="长海报">
</div>

<!-- 报名按钮 -->
<button class="join-btn" onclick="showPopup()">立即报名</button>

<!-- 问卷弹窗 -->
<div class="mask" id="mask">
    <div class="popup">
        <span class="close" onclick="hidePopup()">×</span>
        <iframe src="https://wj.qq.com/s2/26581786/7735/"></iframe>
    </div>
</div>

<script>
function showPopup() {
    document.getElementById('mask').style.display = 'block';
}
function hidePopup() {
    document.getElementById('mask').style.display = 'none';
}
</script>

</body>
</html>
